  - title: {% trans 'Votações' %}
    url: sapl.sessao:votacoes_pesquisa
  - title: {% trans 'Relatórios' %}
    url: sapl.base:relatorios_list
  - title: {% trans 'Sessão OnLine' %}
    url: /v6/
  - title: {% trans 'Tramitação em Lote' %}
