  - title: {% trans 'Matérias Legislativas' %}
    url: {% url 'cmj.search:materia_haystack_search' %}
  - title: {% trans 'Orçamento Impositivo' %}
    url: {% url 'cmj.loa:loa_list' %}
  - title: {% trans 'Análise de Similaridade de Requerimentos' %}
