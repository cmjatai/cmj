name: portalcmj
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    labels:
       NAME: "prometheus"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - cmj-net
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
      GF_SECURITY_ADMIN_PASSWORD: admin
    restart: 'no'
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - 3000:3000
    depends_on:
      - prometheus
    container_name: grafana
    labels:
      NAME: "grafana"
    networks:
      - cmj-net

  cmjredis:
    image: redis:alpine
    container_name: cmjredis
    restart: no
    labels:
       NAME: "cmjredis"
    volumes:
      - credis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - cmj-net
  cmjsolr:
    image: solr:9.5
    restart: no
    command: bin/solr start -c -f
    container_name: cmjsolr
    labels:
        NAME: "cmjsolr"
    volumes:
      - csolr_data:/var/solr
      - csolr_configsets:/opt/solr/server/solr/configsets
    ports:
      - "127.0.0.1:8983:8983"
      - "127.0.0.1:9983:9983"
    networks:
      - cmj-net
  cmjfront2018:
    build:
      context: ../_frontend/v2018/
      dockerfile: ../../docker/Dockerfile.Front2018Dev
    #command: yarn build
    restart: no
    container_name: cmjfront2018
    labels:
       NAME: "cmjfront2018"
    volumes:
      - ../:/var/cmjatai/cmj
    networks:
      - cmj-net
    ports:
      - "8080:8080"
  cmjfront2026:
    build:
      context: ../_frontend/v6/
      dockerfile: ../../docker/Dockerfile.Front2026Dev
    #command: yarn build
    restart: no
    container_name: cmjfront2026
    labels:
       NAME: "cmjfront2026"
    volumes:
      - ../:/var/cmjatai/cmj
    networks:
      - cmj-net
    ports:
      - "5173:5173"
  cmj:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile.Dev
    container_name: cmj
    labels:
      NAME: "cmj"
    restart: no
    environment:
      DEBUG: 'True'
      USE_SOLR: 'True'
      SOLR_COLLECTIONS: portalcmj_cmj,portalcmj_arq
      SOLR_URL: http://solr:solr@cmjsolr:8983
      IS_ZK_EMBEDDED: 'True'
      TZ: America/Sao_Paulo
    volumes:
      - /mnt/volumes/cmj_media:/var/cmjatai/cmj_media
      - ../:/var/cmjatai/cmj
    depends_on:
      - cmjredis
      - cmjfront2018
      - cmjfront2026
      - cmjsolr
    ports:
      - "9099:9000"
    networks:
      - cmj-net
networks:
  cmj-net:
    name: cmj-net
    driver: bridge
volumes:
  csolr_data:
  csolr_configsets:
  credis_data:
  prometheus_data:
  grafana_data:
