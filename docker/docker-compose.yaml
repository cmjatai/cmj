name: portalcmj
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    labels:
       NAME: "prometheus"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    #ports:
    #  - "9090:9090"
    networks:
      - cmj-net

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
      GF_SECURITY_ADMIN_PASSWORD: admin
    restart: 'no'
    volumes:
      - grafana_data:/var/lib/grafana
    #ports:
    #  - 3000:3000
    depends_on:
      - prometheus
    container_name: grafana
    labels:
      NAME: "grafana"
    networks:
      - cmj-net

  cmjredis:
    image: redis:alpine
    container_name: cmjredis
    restart: always #restart: unless-stopped
    labels:
       NAME: "cmjredis"
    volumes:
      - credis_data:/data
    #ports:
    #  - "6379:6379"
    networks:
      - cmj-net
  cmjsolr:
    image: solr:9.5
    restart: always
    command: bin/solr start -c -f
    container_name: cmjsolr
    environment:
      - SOLR_HEAP=4g
    labels:
        NAME: "cmjsolr"
    volumes:
      - csolr9_data:/var/solr
      - csolr9_configsets:/opt/solr/server/solr/configsets
    #ports:
    #  - "8983:8983"
    networks:
      - cmj-net
  cmjdb:
    image: pgvector/pgvector:0.8.1-pg15  #postgres:14.5-alpine
    restart: always
    container_name: cmjpostgres
    labels:
        NAME: "cmjpostgres"
    environment:
      POSTGRES_PASSWORD: cmj
      POSTGRES_USER: cmj
      POSTGRES_DB: cmj
      PGDATA : /var/lib/postgresql/data/
    volumes:
      - cmjdb15_data:/var/lib/postgresql/data/
    #ports:
    #  - "5432:5432"
    networks:
      - cmj-net
  cmjdb18:
    image: pgvector/pgvector:0.8.2-pg18-bookworm
    restart: always
    container_name: cmjpostgres18
    labels:
        NAME: "cmjpostgres18"
    environment:
      POSTGRES_PASSWORD: cmj
      POSTGRES_USER: cmj
      POSTGRES_DB: cmj
      PGDATA : /var/lib/postgresql/data/
    volumes:
      - cmjdb18_data:/var/lib/postgresql/data/
    #ports:
    #  - "5433:5432"
    networks:
      - cmj-net
  cmj:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
    container_name: cmj
    user: "root:root"
    labels:
       NAME: "cmj"
    restart: always
    environment:
      DEBUG: 'False'
      USE_SOLR: 'True'
      SOLR_COLLECTIONS: portalcmj_cmj,portalcmj_arq
      SOLR_URL: http://solr:solr@cmjsolr:8983
      IS_ZK_EMBEDDED: 'True'
      TZ: America/Sao_Paulo
    volumes:
      - cmj_data:/var/cmjatai/cmj_data
      - cmj_media:/var/cmjatai/cmj_media
      - cmj_logs:/var/cmjatai/cmj/logs
    depends_on:
      - cmjdb18
      - cmjredis
      - cmjsolr
    # Sem exposição direta ao host — tráfego entra apenas via WAF
    networks:
      - cmj-net
  waf:
    image: ghcr.io/coreruleset/coraza-crs:4.25.0-nginx-lts
    container_name: cmjwaf
    restart: always
    labels:
      NAME: "cmjwaf"
    # Host nginx (SSL) → :8001 → WAF (8080 interno) → cmj:80 (rede interna)
    ports:
      - "8001:8080"
    environment:
      # URL completa obrigatória para o proxy reverso interno
      - BACKEND=http://cmj:80
      # Nível de paranoia das regras CRS (1=conservador, 4=agressivo)
      - PARANOIA=1
      - EXECUTING_PARANOIA=1
      # Thresholds de anomalia (soma de scores antes de bloquear)
      - ANOMALY_INBOUND=5
      - ANOMALY_OUTBOUND=4
      - ENFORCE_BODYPROC_URLENCODED=1
      # Métodos permitidos pela aplicação
      - ALLOWED_METHODS=GET HEAD POST OPTIONS PUT PATCH DELETE
    networks:
      - cmj-net
    depends_on:
      - cmj
networks:
  cmj-net:
    name: cmj-net
    driver: bridge
volumes:
  cmjdb15_data:
  cmjdb18_data:
  cmj_data:
  cmj_media:
  cmj_logs:
  csolr9_data:
  csolr9_configsets:
  credis_data:
  prometheus_data:
  grafana_data: